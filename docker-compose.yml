version: "3.9"

services:
  proxy:
    build: .
    image: token-slayer-proxy:latest
    container_name: tslayer-proxy
    restart: unless-stopped
    ports:
      - "${TSLAYER_PORT:-8080}:8080"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      TSLAYER_PREFERRED_PROVIDER: "${TSLAYER_PREFERRED_PROVIDER:-anthropic}"
      TSLAYER_SIMILARITY_THRESHOLD: "${TSLAYER_SIMILARITY_THRESHOLD:-0.90}"
      TSLAYER_CACHE_TTL: "${TSLAYER_CACHE_TTL:-3600}"
      TSLAYER_DISABLE_CACHE: "${TSLAYER_DISABLE_CACHE:-false}"
      TSLAYER_DISABLE_ROUTING: "${TSLAYER_DISABLE_ROUTING:-false}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      # Persist semantic cache and cost tracker across restarts
      - tslayer-data:/data/.cca/proxy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: Redis for distributed / multi-instance exact-match cache
  # Uncomment if you run multiple proxy replicas behind a load balancer.
  # redis:
  #   image: redis:7-alpine
  #   container_name: tslayer-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   command: redis-server --save 60 1 --loglevel warning

volumes:
  tslayer-data:
  # redis-data:
